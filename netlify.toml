# Явный Content-Type и запрет Range для статики — меньше 206/обрывов при fetch в SW и у манифеста.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "no-cache"
    Accept-Ranges = "none"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/index.html"
  [headers.values]
    Accept-Ranges = "none"
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Accept-Ranges = "none"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/app-icon-192.png"
  [headers.values]
    Accept-Ranges = "none"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/app-icon-512.png"
  [headers.values]
    Accept-Ranges = "none"
    Cache-Control = "public, max-age=31536000, immutable"
