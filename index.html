<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Modern Design 2.0</title>
    <style>
        :root {
            /* Backgrounds */
            --bg-primary: #0f0c29;
            --bg-secondary: #302b63;
            --bg-tertiary: #24243e;
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            
            /* Player X */
            --player-x-primary: #00d2ff;
            --player-x-secondary: #3a7bd5;
            --player-x-glow: rgba(0, 210, 255, 0.6);
            --player-x-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            
            /* Player O */
            --player-o-primary: #f093fb;
            --player-o-secondary: #f5576c;
            --player-o-glow: rgba(245, 87, 108, 0.6);
            --player-o-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            
            /* Accents */
            --accent-purple: #667eea;
            --accent-violet: #764ba2;
            --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            
            /* Text */
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-muted: #a0a0a0;
            
            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-backdrop: blur(10px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 3em;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
            margin-bottom: 20px;
            text-align: center;
        }

        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.2em;
            background: var(--glass-bg);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-val {
            font-weight: 700;
            font-size: 1.5em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: var(--glass-bg);
            color: var(--text-primary);
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn.active {
            background: var(--accent-gradient);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        .status-indicator {
            padding: 12px 25px;
            border-radius: 15px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop);
            margin-bottom: 25px;
            font-size: 1.2em;
            font-weight: 500;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            text-align: center;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            position: relative;
        }

        .cell {
            aspect-ratio: 1;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 15px;
            backdrop-filter: var(--glass-backdrop);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            user-select: none;
        }

        .cell:hover:not(.occupied) {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.03);
        }

        .cell.occupied {
            cursor: not-allowed;
        }

        .cell.x-symbol {
            color: var(--player-x-primary);
            text-shadow: 0 0 15px var(--player-x-glow);
            animation: placeSymbol 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .cell.o-symbol {
            color: var(--player-o-primary);
            text-shadow: 0 0 15px var(--player-o-glow);
            animation: placeSymbol 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .cell.winner-cell {
            background: var(--accent-gradient);
            animation: pulse 1s ease-in-out infinite;
            transform: scale(1.05);
            z-index: 2;
        }

        .winning-line {
            position: absolute;
            background: var(--player-o-gradient);
            height: 6px;
            border-radius: 3px;
            z-index: 10;
            display: none;
            box-shadow: 0 0 20px var(--player-o-glow);
            pointer-events: none;
            transform-origin: left center;
        }

        /* Animations */
        @keyframes placeSymbol {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            70% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1.03); opacity: 1; }
            50% { transform: scale(1.06); opacity: 0.9; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--accent-gradient);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
            width: 380px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .modal-title {
            font-size: 2.2em;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .modal-symbol {
            font-size: 4.5em;
            font-weight: bold;
            color: #ffffff;
            display: block;
            margin: 15px 0;
            animation: bounce 1s ease infinite;
        }

        .modal-text {
            color: #ffffff;
            font-size: 1.1em;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .modal-btn {
            padding: 14px 35px;
            font-size: 1.1em;
            border: none;
            border-radius: 30px;
            background: #ffffff;
            color: var(--accent-purple);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 1.8em; }
            .cell { font-size: 2.2em; border-radius: 10px; }
            .btn { padding: 8px 16px; font-size: 0.85em; }
            .modal-content { padding: 30px 20px; }
            .game-board { max-width: 320px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TIC-TAC-TOE</h1>
        
        <div class="score-board">
            <div class="score-item">
                <span>Player X</span>
                <span class="score-val" id="score-x">0</span>
            </div>
            <div class="score-item" style="opacity: 0.5;">VS</div>
            <div class="score-item">
                <span>Player O</span>
                <span class="score-val" id="score-o">0</span>
            </div>
        </div>

        <div class="button-group">
            <button class="btn active" id="mode-friend">PvP Mode</button>
            <button class="btn" id="mode-bot">PvAI Mode</button>
            <button class="btn" id="reset-score">Reset Scores</button>
        </div>
        
        <div class="status-indicator" id="status">Player X's Turn</div>
        
        <div class="game-board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
            <div class="winning-line" id="win-line"></div>
        </div>
    </div>

    <!-- Winner Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modal-title">Winner!</h2>
            <span class="modal-symbol" id="modal-symbol">X</span>
            <p class="modal-text" id="modal-text">Player X wins the game!</p>
            <button class="modal-btn" id="play-again">Play Again</button>
        </div>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');
        const modalSymbol = document.getElementById('modal-symbol');
        const modalText = document.getElementById('modal-text');
        const playAgainBtn = document.getElementById('play-again');
        const resetScoreBtn = document.getElementById('reset-score');
        const modeFriendBtn = document.getElementById('mode-friend');
        const modeBotBtn = document.getElementById('mode-bot');
        const scoreXElement = document.getElementById('score-x');
        const scoreOElement = document.getElementById('score-o');
        const winLine = document.getElementById('win-line');

        let currentPlayer = 'X';
        let gameActive = true;
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let isBotMode = false;
        let scores = { X: 0, O: 0 };

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
            [0, 4, 8], [2, 4, 6]             // diagonals
        ];

        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameState[clickedCellIndex] !== "" || !gameActive) return;

            processMove(clickedCellIndex);
        }

        function processMove(index) {
            gameState[index] = currentPlayer;
            const cell = cells[index];
            cell.innerText = currentPlayer;
            cell.classList.add('occupied');
            cell.classList.add(currentPlayer === 'X' ? 'x-symbol' : 'o-symbol');

            if (checkResult()) return;

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusText.innerText = `Player ${currentPlayer}'s Turn`;

            if (isBotMode && currentPlayer === 'O' && gameActive) {
                setTimeout(makeBotMove, 600);
            }
        }

        function makeBotMove() {
            if (!gameActive) return;
            
            // AI logic: 1. Win if possible, 2. Block if needed, 3. Random
            let move = findBestMove();
            processMove(move);
        }

        function findBestMove() {
            // Check win
            for (let condition of winningConditions) {
                let [a, b, c] = condition;
                if (gameState[a] === 'O' && gameState[b] === 'O' && gameState[c] === "") return c;
                if (gameState[a] === 'O' && gameState[c] === 'O' && gameState[b] === "") return b;
                if (gameState[b] === 'O' && gameState[c] === 'O' && gameState[a] === "") return a;
            }
            // Check block
            for (let condition of winningConditions) {
                let [a, b, c] = condition;
                if (gameState[a] === 'X' && gameState[b] === 'X' && gameState[c] === "") return c;
                if (gameState[a] === 'X' && gameState[c] === 'X' && gameState[b] === "") return b;
                if (gameState[b] === 'X' && gameState[c] === 'X' && gameState[a] === "") return a;
            }
            // Center
            if (gameState[4] === "") return 4;
            // Random
            const available = gameState.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            return available[Math.floor(Math.random() * available.length)];
        }

        function checkResult() {
            let roundWon = false;
            let winningCombo = null;

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] !== "" && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    winningCombo = winningConditions[i];
                    break;
                }
            }

            if (roundWon) {
                gameActive = false;
                scores[currentPlayer]++;
                updateScores();
                drawWinningLine(winningCombo);
                highlightWinner(winningCombo);
                showModal(`Player ${currentPlayer} Wins!`, currentPlayer);
                return true;
            }

            if (!gameState.includes("")) {
                gameActive = false;
                showModal("It's a Tie!", "-");
                return true;
            }
            return false;
        }

        function drawWinningLine(combo) {
            const boardRect = boardElement.getBoundingClientRect();
            const startCell = cells[combo[0]].getBoundingClientRect();
            const endCell = cells[combo[2]].getBoundingClientRect();

            const x1 = startCell.left + startCell.width / 2 - boardRect.left;
            const y1 = startCell.top + startCell.height / 2 - boardRect.top;
            const x2 = endCell.left + endCell.width / 2 - boardRect.left;
            const y2 = endCell.top + endCell.height / 2 - boardRect.top;

            const distance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

            winLine.style.width = `${distance}px`;
            winLine.style.transform = `translate(${x1}px, ${y1}px) rotate(${angle}deg)`;
            winLine.style.display = 'block';
            winLine.style.background = currentPlayer === 'X' ? 'var(--player-x-gradient)' : 'var(--player-o-gradient)';
            winLine.style.boxShadow = `0 0 20px ${currentPlayer === 'X' ? 'var(--player-x-glow)' : 'var(--player-o-glow)'}`;
        }

        function highlightWinner(combo) {
            combo.forEach(idx => cells[idx].classList.add('winner-cell'));
        }

        function updateScores() {
            scoreXElement.innerText = scores.X;
            scoreOElement.innerText = scores.O;
        }

        function showModal(title, symbol) {
            modalTitle.innerText = title;
            modalSymbol.innerText = symbol === "-" ? "🤝" : symbol;
            modalText.innerText = symbol === "-" ? "An evenly matched game!" : `Fantastic victory for Player ${symbol}!`;
            setTimeout(() => modal.classList.add('active'), 600);
        }

        function restartGame() {
            gameActive = true;
            currentPlayer = 'X';
            gameState = ["", "", "", "", "", "", "", "", ""];
            statusText.innerText = "Player X's Turn";
            modal.classList.remove('active');
            winLine.style.display = 'none';
            cells.forEach(cell => {
                cell.innerText = "";
                cell.className = 'cell';
            });
        }

        function resetScores() {
            scores = { X: 0, O: 0 };
            updateScores();
            restartGame();
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        playAgainBtn.addEventListener('click', restartGame);
        resetScoreBtn.addEventListener('click', resetScores);
        
        modeFriendBtn.addEventListener('click', () => {
            isBotMode = false;
            modeFriendBtn.classList.add('active');
            modeBotBtn.classList.remove('active');
            restartGame();
        });

        modeBotBtn.addEventListener('click', () => {
            isBotMode = true;
            modeBotBtn.classList.add('active');
            modeFriendBtn.classList.remove('active');
            restartGame();
        });
    </script>
</body>
</html>
